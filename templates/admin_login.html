<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Passyunk Table</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #faf7f2;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; color: #1c1c1c;
  }
  .card {
    background: #fff;
    border: 1px solid #e8e0d5;
    border-radius: 12px;
    padding: 40px 36px;
    width: 360px;
    box-shadow: 0 4px 20px rgba(0,0,0,.07);
  }
  .logo { font-size: 28px; margin-bottom: 6px; }
  h1 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  p  { font-size: 13px; color: #888; margin-bottom: 24px; }
  label { display: block; font-size: 12px; font-weight: 600;
          text-transform: uppercase; letter-spacing: .06em;
          color: #888; margin-bottom: 6px; }
  input[type=password] {
    width: 100%; padding: 10px 12px;
    border: 1px solid #d4c5b5; border-radius: 8px;
    font-size: 14px; font-family: inherit;
    margin-bottom: 16px;
  }
  input[type=password]:focus { outline: none; border-color: #8b1a1a; }
  button {
    width: 100%; padding: 11px;
    background: #8b1a1a; color: #fff;
    border: none; border-radius: 8px;
    font-size: 14px; font-weight: 600;
    cursor: pointer;
  }
  button:hover { background: #6e1313; }
  .error {
    background: #ffeaea; border: 1px solid #f5c5c5;
    border-radius: 7px; padding: 10px 12px;
    font-size: 13px; color: #c0392b;
    margin-bottom: 16px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🍝</div>
  <h1>Admin Panel</h1>
  <p>Passyunk Table — chatbot dashboard</p>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <form method="POST">
    <label for="password">Password</label>
    <input type="password" id="password" name="password" autofocus required>
    <button type="submit">Sign In</button>
  </form>
</div>
</body>
</html>
